[setup]
boxlength		= 200
zstart			= 199.0
levelmin		= 8
##24March025
levelmin_TF		= 8
levelmax		= 12
padding			= 8 
overlap			= 4
ref_center		= 0.5, 0.5, 0.5
ref_extent		= 0.2, 0.2, 0.2
align_top		= no
baryons			= yes
use_2LPT		= no
use_LLA			= yes
periodic_TF		= yes

[cosmology]
Omega_m                 = 0.308316
Omega_L                 = 0.691684
w0                      = -1.0
wa                      = 0.0
Omega_b                 = 0.04865393405
H0                      = 67.64
##Tristram 2024 Planck Cosmological parameters derived from the final Planck data release (PR4)
sigma_8                 = 0.824398
nspec                   = 0.9681
transfer                = camb_file
transfer_file = ../angus_nils_transfer_out.dat

[random]
seed[7]			= 82518
seed[8]			= 11622
seed[9]			= 22279
seed[10]		= 26441
seed[11]		= 72043
seed[12]		= 15220

[output]
format			= grafic2	
filename		= ics_nu2025_b200lmin8lmax12
ramses_nml		= no

[poisson]
fft_fine		= yes
accuracy		= 1e-5
pre_smooth		= 3
post_smooth		= 3
smoother		= gs
laplace_order		= 6
grad_order		= 6
