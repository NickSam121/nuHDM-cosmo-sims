[runtime]
sampler = emcee
root = ${PWD}
verbosity = standard

[emcee]
walkers = 20
samples = 1000
nsteps = 15
start_points = /home/sam121/Desktop/nuHDM/last_points_06-05-2024

[test]
save_dir=output/angus_lite
fatal_errors=T

[DEFAULT]
planck_path = likelihood/planck2018/baseline/plc_3.0

[output]
filename = output/angus_lite_output6.txt
format = text

[pipeline]
modules = consistency mgcamb planck
values = examples/angus_lite_values.ini
priors = examples/angus_lite_priors.ini
debug=T
timing=F

[planck]
file = likelihood/planck2018/planck_interface.so
data_1 = %(planck_path)s/hi_l/plik_lite/plik_lite_v22_TTTEEE.clik
data_2 = %(planck_path)s/low_l/commander/commander_dx12_v3_2_29.clik
data_3 = %(planck_path)s/low_l/simall/simall_100x143_offlike5_EE_Aplanck_B.clik

[consistency]
file = ./utility/consistency/consistency_interface.py
cosmomc_theta = T

[mgcamb]
file = boltzmann/mgcamb/camb.so
mg_model = 0
mode = all
lmax = 2800          ;max ell to use for cmb calculation
feedback=2        ;amount of output to print
do_tensors = True   ;include tensor modes
do_lensing = False    ;lensing is required w/ Planck data
